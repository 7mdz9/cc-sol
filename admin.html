<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard · Soléa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="admin-page">

<div class="cur" id="C"></div>
<div class="cur-r" id="CR"></div>

<nav id="adminMobileNav" class="admin-mobile-nav" data-nav-root>
  <div class="nav-logo">
    <picture>
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="64" height="44" fetchpriority="high">
    </picture>
  </div>
  <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="adminNavOverlay" data-nav-toggle>
    <span class="nav-toggle-box" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </button>
</nav>
<div class="nav-overlay" id="adminNavOverlay" role="dialog" aria-modal="true" aria-hidden="true" data-nav-overlay>
  <div class="nav-overlay-backdrop" data-nav-close></div>
  <div class="nav-overlay-panel">
    <picture class="nav-overlay-brand">
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="160" height="105" loading="lazy" decoding="async">
    </picture>
    <nav class="nav-overlay-nav nav-overlay-nav-compact" aria-label="Admin navigation">
      <a href="#overview" class="nav-overlay-link" data-nav-autoclose data-nav-initial-focus>Overview</a>
      <a href="#orders" class="nav-overlay-link" data-nav-autoclose>Orders</a>
      <a href="#sales" class="nav-overlay-link" data-nav-autoclose>Sales</a>
      <a href="#products" class="nav-overlay-link" data-nav-autoclose>Products</a>
      <a href="#payments" class="nav-overlay-link" data-nav-autoclose>Payments</a>
      <a href="#branches" class="nav-overlay-link" data-nav-autoclose>Branches</a>
      <a href="#export" class="nav-overlay-link" data-nav-autoclose>Export</a>
    </nav>
    <div class="nav-overlay-divider" aria-hidden="true"></div>
    <button class="nav-overlay-cta" id="mobileAdminLogout" type="button" data-nav-autoclose><span>Logout</span></button>
    <p class="nav-overlay-note">SOLÉA INTERNAL DASHBOARD</p>
  </div>
</div>

<aside id="adminSidebar">
  <div class="sidebar-brand">
    <picture>
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="140" height="48">
    </picture>
    <span class="sidebar-scope">Admin</span>
  </div>
  <div class="sidebar-nav-wrap">
    <div class="sidebar-group">
      <p class="sidebar-group-label">Core</p>
      <nav class="sidebar-nav">
        <a href="#overview" data-section="overview">Overview</a>
        <a href="#orders" data-section="orders">Orders</a>
        <a href="#sales" data-section="sales">Sales</a>
      </nav>
    </div>
    <div class="sidebar-group">
      <p class="sidebar-group-label">Operations</p>
      <nav class="sidebar-nav">
        <a href="#products" data-section="products">Products</a>
        <a href="#payments" data-section="payments">Payments</a>
        <a href="#branches" data-section="branches">Branches</a>
      </nav>
    </div>
    <div class="sidebar-group">
      <p class="sidebar-group-label">Tools</p>
      <nav class="sidebar-nav">
        <a href="#export" data-section="export">Export</a>
      </nav>
    </div>
  </div>
  <button class="sidebar-logout" id="btnLogout" type="button">Logout</button>
</aside>

<main id="adminMain">
  <header class="admin-header" id="adminHeader">
    <div class="admin-title-block">
      <p class="admin-eyebrow">Soléa Internal Dashboard</p>
      <h1 class="admin-title" id="adminTitle">Overview</h1>
      <p class="admin-subtitle" id="adminSubtitle">Track dine-in momentum, revenue, and operational signals in one place.</p>
    </div>
    <div class="admin-filter-slot" id="adminFilterSlot"></div>
  </header>

  <section class="admin-section" id="section-overview"></section>
  <section class="admin-section" id="section-orders" hidden></section>
  <section class="admin-section" id="section-sales" hidden></section>
  <section class="admin-section" id="section-products" hidden></section>
  <section class="admin-section" id="section-payments" hidden></section>
  <section class="admin-section" id="section-branches" hidden></section>
  <section class="admin-section" id="section-export" hidden></section>
</main>

<script type="module" src="scripts/admin-main.js"></script>
</body>
</html>
