<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order · Soléa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/15-order-page.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>

<div class="cur" id="C"></div>
<div class="cur-r" id="CR"></div>

<nav id="orderNav">
  <div class="nav-logo">
    <picture>
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="120" height="40" fetchpriority="high">
    </picture>
  </div>
  <div class="nav-context" id="orderContext"></div>
</nav>

<!-- guard: shown when branch/table params are missing or invalid -->
<main id="orderGuard" class="order-guard" hidden>
  <div class="guard-inner">
    <h1>Welcome to Soléa</h1>
    <p>This order page is only available through an active in-store link.</p>
    <p class="guard-sub">If you're exploring from outside the dining experience, visit <a href="index.html">our main site</a> to browse the menu and find a nearby location.</p>
  </div>
</main>

<!-- order UI: populated by subsequent steps -->
<main id="orderApp" class="order-app" hidden>
  <div class="order-layout">
    <section class="order-menu" id="orderMenu"><!-- menu accordion goes here, Step 1 --></section>
    <aside class="order-side">
      <div class="order-preview" id="orderPreview">
        <div class="preview-empty">
          <div class="preview-glyph">✦</div>
          <p class="preview-hint">Select an item</p>
        </div>
        <div class="preview-populated" hidden>
          <div class="preview-image-wrap">
            <picture>
              <source id="previewWebp" type="image/webp">
              <img id="previewImg" alt="" width="800" height="1200" decoding="async">
            </picture>
          </div>
          <div class="preview-details">
            <h2 class="preview-name" id="previewName"></h2>
            <div class="preview-meta">
              <span class="preview-cal"><span id="previewCal">—</span> kcal</span>
              <span class="preview-price"><span id="previewPrice">—</span> AED</span>
            </div>
          </div>
          <button class="btn-add-cart" id="btnAddCart">+ Add to Cart</button>
        </div>
      </div>
      <div class="order-cart" id="orderCart"><!-- cart panel, Step 3+ --></div>
    </aside>
  </div>
</main>

<div class="checkout-modal" id="checkoutModal" hidden>
  <div class="checkout-backdrop"></div>
  <div class="checkout-panel">
    <button class="checkout-close" id="btnCheckoutClose" aria-label="Close">✕</button>
    <h2 class="checkout-title">Complete Your Order</h2>

    <section class="checkout-summary" id="checkoutSummary">
      <!-- cart summary, filled by JS -->
    </section>

    <section class="checkout-form">
      <label class="checkout-label">
        <span>Your Name</span>
        <input type="text" id="customerName" maxlength="50" required>
      </label>
      <label class="checkout-label">
        <span>Phone Number</span>
        <input type="tel" id="customerPhone" placeholder="+971 50 123 4567" required>
      </label>
    </section>

    <section class="checkout-payment">
      <h3>Payment Method</h3>
      <div class="payment-tiles">
        <button class="payment-tile" data-method="card">
          <span class="payment-icon">💳</span>
          <span>Credit Card</span>
        </button>
        <button class="payment-tile" data-method="apple-pay">
          <span class="payment-icon"></span>
          <span>Apple Pay</span>
        </button>
        <button class="payment-tile" data-method="cash">
          <span class="payment-icon">💵</span>
          <span>Cash</span>
        </button>
      </div>
    </section>

    <button class="btn-pay" id="btnPay" disabled>Select Payment Method</button>
  </div>
</div>

<script type="module" src="scripts/order-main.js"></script>
</body>
</html>
