    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <rect width="200" height="200" fill="#FAF5E8"/>
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5EAC0"/>
      <stop offset="100%" stop-color="#FAF5E8"/>
    </linearGradient>
    <linearGradient id="bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8832A"/>
      <stop offset="30%" stop-color="#E8D5A3"/>
      <stop offset="70%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8832A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg1)"/>
  <!-- Bottle body -->
  <rect x="80" y="60" width="40" height="110" rx="8" fill="url(#bot)"/>
