  <rect x="84" y="65" width="10" height="90" rx="3" fill="rgba(255,255,255,0.25)"/>
  <!-- Bottle neck -->
  <rect x="86" y="44" width="28" height="20" rx="4" fill="#C9A84C"/>
  <!-- Cap -->
  <rect x="88" y="36" width="24" height="12" rx="3" fill="#A8832A"/>
  <!-- Label area -->
  <rect x="83" y="95" width="34" height="32" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- S on label -->
  <text x="100" y="117" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#7A5E1A" font-style="italic">S</text>
  <!-- Bottom reflection -->
  <ellipse cx="100" cy="172" rx="20" ry="4" fill="rgba(201,168,76,0.2)"/>
