<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login · Soléa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/17-admin-base.css">
  <link rel="icon" href="favicon.ico">
</head>
<body class="admin-login-page">

<div class="cur" id="C"></div>
<div class="cur-r" id="CR"></div>

<nav id="adminLoginNav" class="admin-mobile-nav admin-login-mobile-nav" data-nav-root>
  <div class="nav-logo">
    <picture>
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="64" height="44" fetchpriority="high">
    </picture>
  </div>
  <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="adminLoginNavOverlay" data-nav-toggle>
    <span class="nav-toggle-box" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </button>
</nav>
<div class="nav-overlay" id="adminLoginNavOverlay" role="dialog" aria-modal="true" aria-hidden="true" data-nav-overlay>
  <div class="nav-overlay-backdrop" data-nav-close></div>
  <div class="nav-overlay-panel">
    <picture class="nav-overlay-brand">
      <source srcset="public/assets/logo.webp" type="image/webp">
      <img src="public/assets/logo.png" alt="Soléa" width="160" height="105" loading="lazy" decoding="async">
    </picture>
    <nav class="nav-overlay-nav" aria-label="Site navigation">
      <a href="index.html#menu" class="nav-overlay-link" data-nav-autoclose data-nav-initial-focus>Menu</a>
      <a href="index.html#branches" class="nav-overlay-link" data-nav-autoclose>Branches</a>
      <a href="index.html#merch" class="nav-overlay-link" data-nav-autoclose>Merch</a>
      <a href="index.html#support" class="nav-overlay-link" data-nav-autoclose>Support</a>
    </nav>
    <div class="nav-overlay-divider" aria-hidden="true"></div>
    <a href="#loginForm" class="nav-overlay-cta" data-nav-autoclose><span>Admin Sign In</span></a>
    <p class="nav-overlay-note">WARM · NATURAL · REFRESHING</p>
  </div>
</div>

<main class="admin-login-shell">
  <section class="admin-login-card">
    <div class="admin-login-brand">
      <picture>
        <source srcset="public/assets/logo.webp" type="image/webp">
        <img src="public/assets/logo.png" alt="Soléa" width="140" height="48">
      </picture>
    </div>
    <div class="admin-login-copy">
      <h1>Soléa Admin</h1>
      <p>Secure access for the local dashboard demo.</p>
    </div>
    <div class="admin-login-error" id="loginError" hidden></div>
    <form id="loginForm" class="admin-login-form">
      <label class="admin-login-field">
        <span>Email</span>
        <input type="email" id="loginEmail" autocomplete="email" placeholder="admin@solea.ae">
      </label>
      <label class="admin-login-field">
        <span>Password</span>
        <input type="password" id="loginPassword" autocomplete="current-password">
      </label>
      <button type="submit" class="admin-login-submit">Sign In</button>
    </form>
    <p class="admin-login-note">Admin access — Soléa internal</p>
  </section>
</main>

<script type="module" src="scripts/admin-auth.js"></script>
</body>
</html>
